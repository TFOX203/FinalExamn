spring.application.name=FinalExam4

server.port=8081

# Base de datos PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5433/mydatabase
spring.datasource.username=myuser
spring.datasource.password=mypassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=clave-secreta-lamborghini-concesionario-madrid-2026
jwt.expiration=86400000

# Spring AI (Gemini via OpenAI-compatible API)
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.api-key=TU_API_KEY_AQUI
spring.ai.openai.chat.model=gemini-2.5-flash
# Ejecutar schema.sql siempre al arrancar
spring.sql.init.mode=always

